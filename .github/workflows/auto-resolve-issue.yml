name: Auto-Resolve Issue

on:
  issues:
    types: [opened, assigned]

jobs:
  resolve:
    runs-on: self-hosted
    if: contains(github.event.issue.labels.*.name, 'role: developer') || contains(github.event.issue.labels.*.name, 'priority: P0') || contains(github.event.issue.labels.*.name, 'priority: P1')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve issue with Claude Code CLI
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY=$(gh issue view $ISSUE_NUM --repo ${{ github.repository }} --json body --jq .body | head -50)
          
          echo "Resolving issue #$ISSUE_NUM: $ISSUE_TITLE"
          
          ~/.local/bin/claude --print --permission-mode bypassPermissions \
            "You are a developer for ACE-Step DAW.
          
          Fix issue #$ISSUE_NUM: $ISSUE_TITLE
          
          Details:
          $ISSUE_BODY
          
          Steps:
          1. cd /Users/junmingong/.openclaw/workspace/acestep-daw && git fetch origin && git reset --hard origin/main
          2. Understand the issue and find relevant files
          3. Implement the fix/feature
          4. npm run build (must pass)
          5. npx vitest run tests/unit/ (must pass)
          6. git checkout -b fix/issue-$ISSUE_NUM
          7. git add -A && git -c user.name=ChuxiJ -c user.email=junmin@acestudio.ai commit -m 'fix: resolve #$ISSUE_NUM — $ISSUE_TITLE'
          8. git push origin fix/issue-$ISSUE_NUM
          9. Create PR: gh pr create --repo ace-step/ACE-Step-DAW --title 'fix: resolve #$ISSUE_NUM' --body 'Closes #$ISSUE_NUM' --base main
          10. Request Copilot review: gh api repos/ace-step/ACE-Step-DAW/pulls/\$(gh pr view fix/issue-$ISSUE_NUM --json number --jq .number)/requested_reviewers -f 'reviewers[]=copilot[bot]'
          "
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
